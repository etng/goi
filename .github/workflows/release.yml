name: Request community release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  request-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public core
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate public tag
        env:
          PUBLIC_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$PUBLIC_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
            echo "Invalid tag: $PUBLIC_TAG" >&2
            exit 1
          fi
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ "${PUBLIC_TAG#v}" != "$FILE_VERSION" ]]; then
            echo "Tag ${PUBLIC_TAG#v} does not match VERSION file ($FILE_VERSION)." >&2
            exit 1
          fi

      - name: Create short-lived release token
        id: release-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: goi-community
          permission-contents: write

      - name: Request private assembly
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          PUBLIC_TAG: ${{ github.ref_name }}
          PUBLIC_SHA: ${{ github.sha }}
          TARGET_REPOSITORY: ${{ github.repository_owner }}/goi-community
        run: |
          set -euo pipefail
          jq -n \
            --arg public_tag "$PUBLIC_TAG" \
            --arg public_sha "$PUBLIC_SHA" \
            '{
              event_type: "public-release",
              client_payload: {
                public_tag: $public_tag,
                public_sha: $public_sha
              }
            }' | gh api \
              --method POST \
              "repos/$TARGET_REPOSITORY/dispatches" \
              --input -
