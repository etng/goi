name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate tag is SemVer
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
            echo "Invalid tag: $TAG (expected v<MAJOR>.<MINOR>.<PATCH>)"
            exit 1
          fi

      - name: Validate VERSION file matches tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ "${TAG#v}" != "$FILE_VERSION" ]]; then
            echo "Tag ${TAG#v} does not match VERSION file ($FILE_VERSION). Bump VERSION before tagging."
            exit 1
          fi

      - name: Build release DMG (universal) and zip
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ./scripts/make-dmg.sh
          # zip the app the DMG just built (avoid a second universal compile)
          ( cd dist && ditto -c -k --keepParent "Goi.app" "Goi.zip" )

      - name: Verify signature
        run: codesign -dv --verbose=4 "dist/Goi.app" || true

      - name: Generate release notes
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PREV_TAG="$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | grep -v "^${TAG}$" | head -n1 || true)"
          RANGE="$TAG"
          [[ -n "$PREV_TAG" ]] && RANGE="${PREV_TAG}..${TAG}"
          {
            echo "## Goi ${TAG}"
            echo
            if [[ -n "$PREV_TAG" ]]; then
              echo "变更对比：https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
              echo
            fi
            echo "### Changes"
            git log --no-merges --pretty='- %s (%h)' "$RANGE" || echo "- (no commits)"
            echo
            echo "---"
            echo "**下载 \`Goi.dmg\`**（通用版，Apple 芯片与 Intel 都可用），双击打开后把 Goi 拖进「应用程序」。"
            echo
            echo "首次打开若提示「已损坏」或「无法验证开发者」，这是因为没有购买苹果签名，并非病毒："
            echo "在「应用程序」里 **右键 Goi → 打开**，或到「系统设置 → 隐私与安全性」点「仍要打开」。只需一次。"
            echo "（也提供 \`Goi.zip\`，内容相同。）"
          } > dist/release-notes.md
          cat dist/release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file dist/release-notes.md \
            dist/Goi.dmg dist/Goi.zip
